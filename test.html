<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
    <title>WebGL Spinning Box</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            width: 80vmin;
            height: 80vmin;
            border-radius: 12px;
            touch-action: none;
        }
        #sidebar {
            position: absolute;
            right: 0;
            top: 0;
            width: 300px;
            height: 100%;
            background: rgba(20, 20, 30, 0.9);
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #333;
            color: #ddd;
            font-family: sans-serif;
            z-index: 10;
        }
        #sidebar h3 {
            margin-bottom: 20px;
            color: #fff;
        }
        .seed-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 14px;
        }
        .seed-toggle input {
            margin-right: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- ============ Box Shaders (GLSL 300 es) ============ -->

<script id="vshader-box" type="x-shader/x-vertex">#version 300 es
    in vec3 aPosition;
    in vec3 aNormal;
    in vec3 aColor;

    uniform mat4 uModelViewProjection;
    uniform mat4 uNormalMatrix;
    uniform vec3 uLightDir;

    out float vDot;
    out vec3 vColor;

    void main() {
        gl_Position = uModelViewProjection * vec4(aPosition, 1.0);
        vec3 transNormal = normalize((uNormalMatrix * vec4(aNormal, 0.0)).xyz);
        vDot = max(dot(transNormal, normalize(uLightDir)), 0.0);
        vColor = aColor;
    }
</script>

<script id="fshader-box" type="x-shader/x-fragment">#version 300 es
    precision mediump float;

    in float vDot;
    in vec3 vColor;
    out vec4 fragColor;

    void main() {
        fragColor = vec4(vColor, 1.0);
    }
</script>

<!-- ============ Texture Baker Shaders (GLSL 300 es) ============ -->

<script id="texture-baker-vertex" type="x-shader/x-vertex">#version 300 es
    in vec2 aPosition;
    out vec2 vUV;
    
    void main() {
        vUV = aPosition;
        gl_Position = vec4(aPosition, 0.0, 1.0);
    }
</script>

<script id="texture-baker-fragment" type="x-shader/x-fragment">#version 300 es
    precision highp float;
    precision highp int;

    #define MAX_POINTS 64

    layout(std140) uniform VoronoiPoints {
        int  uNumPoints;
        vec4 uPoints[MAX_POINTS];
    };

    uniform float uSliceZ;

    in vec2 vUV;
    out vec4 fragColor;

    void main() {
        vec3 worldPos = vec3(vUV, uSliceZ);

        float minDist = 1e10;
        int closestIdx = 0;

        for (int i = 0; i < MAX_POINTS; i++) {
            if (i >= uNumPoints) break;
            float d = dot(worldPos - uPoints[i].xyz, worldPos - uPoints[i].xyz);
            if (d < minDist) {
                minDist = d;
                closestIdx = i;
            }
        }

        fragColor = vec4(float(closestIdx) / 255.0, 0.0, 0.0, 1.0);
    }
</script>

<div id="sidebar">
    <h3>Seed Points</h3>
    <div id="seed-list"></div>
</div>

<canvas id="glcanvas"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="input.js"></script>
<script src="engine.js"></script>
</body>
</html>
