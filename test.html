<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
    <title>WebGL Spinning Box</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            width: 80vmin;
            height: 80vmin;
            border-radius: 12px;
            touch-action: none;
        }

        #sidebar {
            position: absolute;
            right: 0;
            top: 0;
            width: 300px;
            height: 100%;
            background: rgba(20, 20, 30, 0.9);
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #333;
            color: #ddd;
            font-family: sans-serif;
            z-index: 10;
        }

        #sidebar h3 {
            margin-bottom: 20px;
            color: #fff;
        }

        .seed-toggle {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .seed-toggle input {
            margin-right: 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- ============ Box Shaders (GLSL 300 es) ============ -->

    <script id="vshader-box" type="x-shader/x-vertex">#version 300 es
    in vec3 aPosition;
    in vec3 aNormal;
    in vec3 aColor;

    uniform mat4 uModelViewProjection;
    uniform mat4 uNormalMatrix;
    uniform vec3 uLightDir;

    out float vDot;
    out vec3 vColor;

    void main() {
        gl_Position = uModelViewProjection * vec4(aPosition, 1.0);
        vec3 transNormal = normalize((uNormalMatrix * vec4(aNormal, 0.0)).xyz);
        vDot = max(dot(transNormal, normalize(uLightDir)), 0.0);
        vColor = aColor;
    }
</script>

    <script id="fshader-box" type="x-shader/x-fragment">#version 300 es
    precision mediump float;

    in float vDot;
    in vec3 vColor;
    out vec4 fragColor;

    void main() {
        fragColor = vec4(vColor, 1.0);
    }
</script>

    <!-- ============ Texture Baker Shaders (GLSL 300 es) ============ -->

    <script id="texture-baker-vertex" type="x-shader/x-vertex">#version 300 es
    in vec2 aPosition;
    out vec2 vUV;
    
    void main() {
        vUV = aPosition;
        gl_Position = vec4(aPosition, 0.0, 1.0);
    }
</script>

    <script id="texture-baker-fragment" type="x-shader/x-fragment">#version 300 es
    precision highp float;
    precision highp int;

    #define MAX_POINTS 64

    layout(std140) uniform VoronoiPoints {
        int  uNumPoints;
        vec4 uPoints[MAX_POINTS];
    };

    uniform float uSliceZ;

    in vec2 vUV;
    out uvec4 fragColor;

    void main() {
        vec3 worldPos = vec3(vUV, uSliceZ);

        float minDist = 1e10;
        int closestIdx = 0;

        for (int i = 0; i < MAX_POINTS; i++) {
            if (i >= uNumPoints) break;
            float d = dot(worldPos - uPoints[i].xyz, worldPos - uPoints[i].xyz);
            if (d < minDist) {
                minDist = d;
                closestIdx = i;
            }
        }

        fragColor = uvec4(closestIdx, 0, 0, 0);
    }
</script>

    <script id="raymarch-vertex" type="x-shader/x-vertex">#version 300 es
    in vec3 aPosition;

    uniform mat4 uMVP;

    out vec3 vModelPos;

    void main() {
        vModelPos = aPosition;
        gl_Position = uMVP * vec4(aPosition, 1.0);
    }
</script>

    <script id="raymarch-fragment" type="x-shader/x-fragment">#version 300 es
    precision highp float;
    precision highp usampler3D;

    in vec3 vModelPos;
    out vec4 fragColor;

    uniform vec3 uCameraPos;
    uniform uint uSeedMaskLow;
    uniform uint uSeedMaskHigh;
    uniform usampler3D uVolumeTexture;
    uniform float uTextureRes;

    bool isEnabled(uint index) {
        if (index < 32u) {
            return ((uSeedMaskLow >> index) & 1u) != 0u;
        } else {
            return ((uSeedMaskHigh >> (index - 32u)) & 1u) != 0u;
        }
    }

    vec2 intersectBox(vec3 rayOrigin, vec3 rayDir, vec3 boxMin, vec3 boxMax) {
        vec3 tMin = (boxMin - rayOrigin) / rayDir;
        vec3 tMax = (boxMax - rayOrigin) / rayDir;

        vec3 t1 = min(tMin, tMax);
        vec3 t2 = max(tMin, tMax);

        float tNear = max(t1.x, max(t1.y, t1.z));
        float tFar = min(t2.x, min(t2.y, t2.z));

        return vec2(tNear, tFar);
    }

    vec3 cellColor(int index) {
       float hue = float(index) * 0.618033988749895;
       vec3 color = 0.5 + 0.5 * cos(6.2831853 * (hue + vec3(0.0, 0.33, 0.67)));
       return color; 
    }

    void main() {
        vec3 ray_dir = normalize(vModelPos - uCameraPos);

        vec2 t = intersectBox(uCameraPos, ray_dir, vec3(-1.0), vec3(1.0));
        t.x = max(t.x, 0.0);
        if (t.x > t.y) {
            discard;
        }

        float step = 1.0 / uTextureRes;
        for (float s = t.x; s < t.y; s+= step) {
            vec3 pos = uCameraPos + ray_dir * s;
            vec3 uvw = pos * 0.5 + 0.5;

            uint index = texture(uVolumeTexture, uvw).r;

            if (isEnabled(index)) {
                fragColor = vec4(cellColor(int(index)), 1.0);
                return;
            }
        }
        
        discard;
    }
</script>

    <div id="sidebar">
        <h3>Seed Points</h3>
        <div id="seed-list"></div>
    </div>

    <canvas id="glcanvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="input.js"></script>
    <script src="engine.js"></script>
</body>

</html>
